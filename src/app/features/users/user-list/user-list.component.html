<div class="user-list-container">
  <header class="page-header">
    <div class="header-left">
      <h1>User Management</h1>
      <p>Manage your application users and their roles. <span class="debug-badge">{{ debugStatus }}</span></p>
    </div>
    <div class="header-right">
      <button mat-stroked-button (click)="loadUsers()" style="margin-right: 8px;">
        <mat-icon>refresh</mat-icon> Reload
      </button>
      <button mat-flat-button color="primary" (click)="addUser()">
        <mat-icon>add</mat-icon> Add User
      </button>
    </div>
  </header>

  <mat-card class="table-card">
    <div class="table-header">
      <mat-form-field appearance="outline">
        <mat-label>Search users</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. John Doe" #input>
        <mat-icon matPrefix>search</mat-icon>
      </mat-form-field>
    </div>

    <div class="table-container">
      <mat-progress-bar mode="indeterminate" *ngIf="isLoading"></mat-progress-bar>
      <table mat-table [dataSource]="dataSource" matSort>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
          <td mat-cell *matCellDef="let user"> {{user.name}} </td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
          <td mat-cell *matCellDef="let user"> {{user.email}} </td>
        </ng-container>

        <!-- Role Column -->
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Role </th>
          <td mat-cell *matCellDef="let user"> 
            <span class="role-badge" [ngClass]="user.role">{{user.role}}</span>
          </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
          <td mat-cell *matCellDef="let user">
            <mat-chip-set>
              <mat-chip [class]="user.status" highlighted>
                {{user.status === 'active' ? 'Active' : 'Inactive'}}
              </mat-chip>
            </mat-chip-set>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let user">
            <button mat-icon-button color="primary" (click)="editUser(user)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteUser(user._id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="5">No data matching the filter "{{input.value}}"</td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
    </div>
  </mat-card>
</div>
