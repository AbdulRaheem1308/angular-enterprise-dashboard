<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Create Account</mat-card-title>
      <mat-card-subtitle>Join our enterprise dashboard today.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="error-container" *ngIf="errorMessage">
        <mat-icon>error</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name" placeholder="John Doe">
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="john@example.com">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input matInput formControlName="confirmPassword" type="password">
          <mat-icon matSuffix>lock_clock</mat-icon>
          <mat-error *ngIf="registerForm.hasError('mismatch')">Passwords do not match</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width action-button" 
                type="submit" [disabled]="registerForm.invalid || isLoading">
          <span *ngIf="!isLoading">Register</span>
          <span *ngIf="isLoading">Creating Account...</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <div class="auth-links">
        <span>Already have an account?</span>
        <a routerLink="/login">Login here</a>
      </div>
    </mat-card-footer>
  </mat-card>
</div>
